<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>剪贴板侧栏</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #f0fdfa;
      }
    </style>
  </head>
  <body>
    <script>
      const devUrl = 'http://127.0.0.1:5173/?view=sidebar';
      const prodUrl = 'index.html?view=sidebar';

      fetch('http://127.0.0.1:5173/@vite/client', { mode: 'no-cors' })
        .then(() => {
          window.location.replace(devUrl);
        })
        .catch(() => {
          window.location.replace(prodUrl);
        });
    </script>
  </body>
</html>
